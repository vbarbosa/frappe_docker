# Override para usar a imagem customizada ury-erp:v15 (frappe+erpnext+hrms+ury)
# Uso: docker compose -f pwd.yml -f ury.override.yml up -d
services:
  backend:
    image: ury-erp:v15
  configurator:
    image: ury-erp:v15
  create-site:
    image: ury-erp:v15
    command:
      - >
        wait-for-it -t 120 db:3306;
        wait-for-it -t 120 redis-cache:6379;
        wait-for-it -t 120 redis-queue:6379;
        export start=`date +%s`;
        until [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".db_host // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_cache // empty"` ]] && \
          [[ -n `grep -hs ^ sites/common_site_config.json | jq -r ".redis_queue // empty"` ]];
        do
          echo "Waiting for sites/common_site_config.json to be created";
          sleep 5;
          if (( `date +%s`-start > 120 )); then
            echo "could not find sites/common_site_config.json with required keys";
            exit 1
          fi
        done;
        echo "sites/common_site_config.json found";
        bench new-site --mariadb-user-host-login-scope='%' --admin-password=${ADMIN_PASSWORD} --db-root-username=root --db-root-password=${DB_PASSWORD} --install-app erpnext --install-app hrms --install-app ury --set-default frontend;
  frontend:
    image: ury-erp:v15
    ports:
      - "127.0.0.1:8080:8080"   # localhost dentro da VM (via VS Code)
      - "${TS_IP}:8080:8080"    # acesso remoto via Tailscale
  queue-long:
    image: ury-erp:v15
  queue-short:
    image: ury-erp:v15
  scheduler:
    image: ury-erp:v15
  websocket:
    image: ury-erp:v15
